[project]
name = "tickethub"
version = "0.1.0"
description = "TicketHub REST API entrance test solution"
requires-python = ">=3.11,<3.12"
dependencies = [
    "fastapi==0.111.0",
    "uvicorn[standard]",
    "httpx==0.27.0",
    "sqlalchemy==2.0.36",
    "aiosqlite",
    "alembic",
    "pydantic-settings",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]