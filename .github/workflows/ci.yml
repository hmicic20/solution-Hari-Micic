name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Postavi Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaliraj dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check src tests

      - name: Pytest
        run: |
          pytest

      - name: Export OpenAPI documentation
        run: |
          python -m tickethub.commands.export_openapi

      - name: Alembic migracije
        run: |
          python -m alembic upgrade head

      - name: Docker build
        run: |
          docker build -t tickethub-api .